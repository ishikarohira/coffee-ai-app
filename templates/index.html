<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coffee Mood ☕</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f5f3ef;
            color: #2d2d2d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .tagline {
            font-size: 14px;
            color: #7a7a7a;
            margin-bottom: 25px;
        }

        button {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #f0ebe5;
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            background: white;
            border: 1px solid #e5e5e5;
            text-align: left;
        }

        .coffee-name {
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .coffee-recipe {
            font-size: 14px;
            color: #555;
        }

        .extra-line {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>☕ Coffee Picker</h1>
    <p class="tagline">Choose your mood</p>

    <form method="POST">
        <button name="mood" value="happy">😊 Happy</button>
        <button name="mood" value="tired">😴 Tired</button>
        <button name="mood" value="stressed">😵 Stressed</button>
        <button name="mood" value="lazy">🛋️ Lazy</button>
        <button name="mood" value="adventurous">🔥 Adventurous</button>
        <button name="surprise" value="true">🎲 Surprise me</button>
    </form>

    {% if coffee %}
    <div class="result">
        <div class="coffee-name">{{ coffee.name }}</div>
        <div class="coffee-recipe">{{ coffee.recipe }}</div>
        <p class="extra-line">
            Small decisions matter more than they should.
        </p>
    </div>
    {% endif %}
</div>

</body>
</html>
